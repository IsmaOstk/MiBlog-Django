{% extends 'base.html' %}
{% block title %}Eliminar post{% endblock %}

{% block content %}
<h1>¿Eliminar "{{ post.titulo }}"?</h1>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'post_detail' post.pk %}">Cancelar</a>
</form>
{% endblock %}
