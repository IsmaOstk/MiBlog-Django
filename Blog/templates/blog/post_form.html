{% extends 'base.html' %}
{% block title %}{% if form.instance.pk %}Editar{% else %}Nuevo{% endif %} post{% endblock %}

{% block content %}
<h1>{% if form.instance.pk %}Editar post{% else %}Nuevo post{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
</form>
<a href="{% url 'perfil' %}">Volver a mi perfil</a>
{% endblock %}
