<!-- perfil_form.html -->
{% extends 'base.html' %}
{% block title %}Editar perfil{% endblock %}
{% block content %}
<h1>Editar perfil</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar cambios</button>
</form>
<a href="{% url 'perfil' %}">Cancelar</a>
{% endblock %}
